services:

  # --------------------------------------------------------------------------
  # Loki — 로그 저장소
  # --------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    networks:
      - monitoring
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      # Loki 설정 파일 마운트
      - ./config/loki/config.yml:/etc/loki/config.yaml:ro
      # 로그 데이터 영속화
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Alloy — 로그 수집기 (logs/ 디렉토리 테일링 → Loki 전송)
  # --------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.7.4
    container_name: alloy
    networks:
      - monitoring
    ports:
      - "${ALLOY_PORT}:12345"
    volumes:
      # Alloy 설정 파일
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # 앱이 생성하는 로그 디렉토리 마운트 (읽기 전용)
      - ./logs:/var/log/app:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/12345'"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      loki:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # Grafana — 로그 시각화
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    networks:
      - monitoring
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    volumes:
      # 대시보드 및 설정 영속화
      - grafana_data:/var/lib/grafana
      # Loki 데이터소스 자동 프로비저닝
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M
        reservations:
          cpus: '0.25'
          memory: 96M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - loki

volumes:
  loki_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
